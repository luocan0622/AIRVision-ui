[pytest]
# pytest 配置文件

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 命令行选项
# - pytest-html 报告: reports/report.html
# - Airtest 风格步骤报告（每步截图）: reports/airtest/<时间戳>/index.html
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --html=reports/report.html
    --self-contained-html

# 自定义标记
markers =
    smoke: 冒烟测试，验证核心功能
    regression: 回归测试，验证已有功能
    slow: 耗时较长的测试
    integration: 集成测试
    unit: 单元测试
    demo: Filter 工具添加 Demo 测试

# 日志配置
log_cli = false
log_cli_level = INFO
log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 最小 Python 版本
minversion = 7.0